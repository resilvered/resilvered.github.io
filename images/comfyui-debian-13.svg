<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="800" height="400" fill="url(#grid)"/>
  </g>

  <!-- Glow behind terminal -->
  <ellipse cx="400" cy="220" rx="320" ry="180" fill="#6366f1" opacity="0.06" filter="url(#blur)"/>

  <!-- Terminal window -->
  <rect x="120" y="60" width="560" height="280" rx="8" fill="#0f0f23" stroke="#2d2d5e" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="120" y="60" width="560" height="32" rx="8" fill="#1e1e3a"/>
  <rect x="120" y="76" width="560" height="16" fill="#1e1e3a"/>
  <!-- Dots -->
  <circle cx="140" cy="76" r="6" fill="#ff5f57"/>
  <circle cx="162" cy="76" r="6" fill="#febc2e"/>
  <circle cx="184" cy="76" r="6" fill="#22c55e"/>
  <!-- Title text -->
  <text x="400" y="81" font-family="monospace" font-size="12" fill="#8888aa" text-anchor="middle">comfyui@debian:~/Source/ComfyUI</text>

  <!-- Terminal content -->
  <text x="145" y="115" font-family="monospace" font-size="13" fill="#22c55e">$</text>
  <text x="160" y="115" font-family="monospace" font-size="13" fill="#e0e0e0">python main.py --enable-manager</text>

  <text x="145" y="150" font-family="monospace" font-size="12" fill="#8888aa">Total VRAM 7966 MB, total RAM 63974 MB</text>
  <text x="145" y="170" font-family="monospace" font-size="12" fill="#8888aa">pytorch version:</text>
  <text x="290" y="170" font-family="monospace" font-size="12" fill="#22c55e">2.9.1+cu128</text>

  <text x="145" y="200" font-family="monospace" font-size="12" fill="#a78bfa">Device:</text>
  <text x="215" y="200" font-family="monospace" font-size="12" fill="#22c55e">cuda:0</text>
  <text x="275" y="200" font-family="monospace" font-size="12" fill="#e0e0e0">NVIDIA GeForce RTX 3060</text>
  <text x="145" y="220" font-family="monospace" font-size="12" fill="#8888aa">cudaMallocAsync</text>

  <!-- CUDA / Python badges -->
  <rect x="145" y="250" width="100" height="22" rx="4" fill="#1e3a1e" stroke="#22c55e" stroke-width="0.5"/>
  <text x="195" y="265" font-family="monospace" font-size="11" fill="#22c55e" text-anchor="middle">CUDA 12.8</text>

  <rect x="255" y="250" width="95" height="22" rx="4" fill="#1e1e3a" stroke="#6366f1" stroke-width="0.5"/>
  <text x="302" y="265" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">Python 3.12</text>

  <rect x="360" y="250" width="85" height="22" rx="4" fill="#2e1e2e" stroke="#a855f7" stroke-width="0.5"/>
  <text x="402" y="265" font-family="monospace" font-size="11" fill="#c084fc" text-anchor="middle">Debian 13</text>

  <!-- Blinking cursor -->
  <rect x="390" y="288" width="8" height="15" fill="#a78bfa" opacity="0.8"/>

  <!-- Bottom gradient line -->
  <rect x="145" y="310" width="510" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>

  <!-- Header text -->
  <text x="400" y="370" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#e0e0e0" text-anchor="middle" letter-spacing="1">
    ComfyUI on <tspan fill="url(#accent)">Debian 13</tspan>
  </text>

  <!-- Subtitle -->
  <text x="400" y="392" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#666688" text-anchor="middle" letter-spacing="2">
    PYTHON 3.12 · RTX 3060 · DRIVER 550 · FORWARD COMPATIBILITY
  </text>
</svg>
